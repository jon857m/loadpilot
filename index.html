<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RoutePilot Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="planner.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  </head>
  <body>
    <div class="app">
      <!-- TOP SECTION -->
      <div class="top">
        <!-- JOB POT -->
        <div class="panel job-pot">
            <div class="panel-header">
            <h2>Job Pot</h2>

            <div class="panel-actions">
                <button id="newOrderBtn" class="primary-btn">New Order</button>

                <input
                id="jobSearchInput"
                type="text"
                placeholder="Search jobs..."
                />
            </div>
            </div>

          <div class="job-controls">
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="unallocated">
                Unallocated
              </button>
              <button class="filter-btn" data-filter="allocated">
                Allocated
              </button>
            </div>

            <div class="view-group">
              <button class="view-btn active" data-view="jobs">Jobs</button>
              <button class="view-btn" data-view="legs">Legs</button>
            </div>
          </div>

          <div class="job-controls">
            <div class="date-group">
              <button class="date-btn active" data-date="all">All Dates</button>
              <button class="date-btn" data-date="today">Today</button>
              <button class="date-btn" data-date="tomorrow">Tomorrow</button>
              <button id="jobDatePrevBtn" class="date-step-btn" title="Previous day">◀</button>
              <input id="jobDatePicker" class="date-picker" type="date" />
              <button id="jobDateNextBtn" class="date-step-btn" title="Next day">▶</button>
            </div>

            <div class="mode-filter-group">
              <button class="mode-btn active" data-mode="all">All</button>
              <button class="mode-btn" data-mode="direct">Direct</button>
              <button class="mode-btn" data-mode="via_depot">Via Depot</button>
            </div>

            <div class="type-group">
              <button class="type-btn active" data-type="all">All</button>
              <button class="type-btn" data-type="collect">Collections</button>
              <button class="type-btn" data-type="deliver">Deliveries</button>
            </div>

            <div class="depot-group">
              <label>
                <input type="checkbox" id="toggleDepot" checked />
                Include depot
              </label>
            </div>
          </div>

          <div class="bulk-bar">
            <span id="selectedCount">0 selected</span>

            <input id="bulkRunInput" type="text" placeholder="Run" />

            <button id="assignSelectedBtn">Assign Selected</button>
            <button id="clearSelectionBtn">Clear Selection</button>
          </div>

          <div class="job-list">
            <!-- HEADER ROW -->
            <div class="job-header">
              <div></div>
              <!-- checkbox space -->
              <div>Order</div>

              <div>C/D</div>
              <div>Depot</div>
              <div>Detail</div>

              <div>C/D</div>
              <div>Depot</div>
              <div>Detail</div>

              <div>Pallets</div>
              <div>Load</div>
            </div>

            <!-- Job rows will be rendered by planner.js -->
          </div>
        </div>

        <!-- RUNS -->
            <div class="panel runs">
            <div class="panel-header">
                <h2 id="runsTitle">Runs</h2>
            </div>

            <div class="run-controls">
                <button class="run-date-btn active" data-run-date="today">Today</button>
                <button class="run-date-btn" data-run-date="tomorrow">Tomorrow</button>
                <button id="runDatePrevBtn" class="date-step-btn" title="Previous day">◀</button>
                <input id="runDatePicker" class="date-picker" type="date" />
                <button id="runDateNextBtn" class="date-step-btn" title="Next day">▶</button>
                <label class="run-window-toggle">
                <input type="checkbox" id="runWindowOffsetToggle" />
                -4hrs
                </label>
                <label class="run-window-toggle">
                <input type="checkbox" id="runEditModeToggle" />
                Edit runs
                </label>
                <button id="addRunBtn" class="primary-btn">Add Run</button>
            </div>

        <div class="run-list"></div>
        </div>
      </div>

      <!-- BOTTOM SECTION -->
      <div class="bottom panel">
        <div class="panel-header">
          <h2>Active Route</h2>
        </div>

        <div class="unallocate-dropzone">Remove from run</div>

        <div class="route-empty">Select a run to begin planning</div>

        <div class="route-list" style="display: none">
          <!-- stops will go here later -->
        </div>
      </div>
    </div>

    <div id="orderWizard" class="wizard-backdrop hidden">
  <div class="wizard-panel">
    <div class="wizard-header">
      <h2>New Job</h2>
      <button id="closeWizardBtn" class="icon-btn">×</button>
    </div>

    <div class="wizard-grid">
      <label>
        Customer
        <input id="wizardCustomer" type="text" placeholder="Demo Customer Ltd" />
      </label>

      <label>
        Order number
        <input id="wizardOrderNumber" type="text" placeholder="ORD-1002" />
      </label>

      <label>
        Collection name
        <input id="wizardCollectName" type="text" placeholder="Collection site" />
      </label>

      <label>
        Collection town
        <input id="wizardCollectTown" type="text" placeholder="Leeds" />
      </label>

      <label>
        Collection postcode
        <input id="wizardCollectPostcode" type="text" placeholder="LS1 1AA" />
      </label>

      <label>
        Delivery name
        <input id="wizardDeliverName" type="text" placeholder="Delivery site" />
      </label>

      <label>
        Delivery town
        <input id="wizardDeliverTown" type="text" placeholder="Manchester" />
      </label>

      <label>
        Delivery postcode
        <input id="wizardDeliverPostcode" type="text" placeholder="M1 1AE" />
      </label>

        <label>
        Collection date
        <input id="wizardCollectionDate" type="date" />
        </label>

        <label>
        Collection time
        <input id="wizardCollectionTime" type="time" value="09:00" />
        </label>

        <label>
        Delivery date
        <input id="wizardDeliveryDate" type="date" />
        </label>

        <label>
        Delivery time
        <input id="wizardDeliveryTime" type="time" value="11:00" />
        </label>

        <label>
        Pallets
        <input id="wizardPallets" type="number" min="1" value="1" />
        </label>

        <label>
        Planning mode
        <select id="wizardPlanningMode">
          <option value="direct">Direct</option>
          <option value="via_depot">Via depot</option>
        </select>
      </label>
    </div>

    <div class="wizard-footer">
      <button id="cancelWizardBtn" class="secondary-btn">Cancel</button>
      <button id="saveWizardBtn" class="primary-btn">Create Job</button>
    </div>
  </div>
</div>

    <script src="supabase.js"></script>

    <script src="planner.js"></script>
  </body>
</html>
